<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AudioEval</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>AudioEval <span id="audio-status" class="status-badge">AudioContext: Suspend</span></h1>
  </header>

  <div class="control-panel">
    <div class="control-group">
      <select id="preset-select">
        <option value="">-- Preset --</option>
      </select>
    </div>

    <div class="control-group">
      <button id="btn-eval" class="btn-primary">Eval</button>
      <button id="btn-stop" class="btn-danger">Stop</button>
    </div>

    <div class="control-group control-group-history">
      <select id="history-select">
        <option value="">-- History --</option>
      </select>
      <button id="btn-save">Save</button>
    </div>
  </div>

  <main>
    <div class="editor-layout">
      <div class="editor-container">
        <textarea id="editor" spellcheck="false" placeholder="ここにJavaScriptコードを入力してください..."></textarea>
        <div class="shortcut-tip">Ctrl + Enter / Cmd + Enter で実行</div>
      </div>
      <aside id="parameter-panel" class="parameter-panel">
        <div class="parameter-panel-header">
          Parameters
        </div>

        <div id="parameter-list"></div>
      </aside>
    </div>
    <div class="console-container">
      <div class="console-header">CONSOLE / STATUS</div>
      <div id="console-log" class="console-log"></div>
    </div>
  </main>

  <script src="sound.js"></script>
  <script src="sound_data.js"></script>
  <script src="main.js"></script>
</body>
</html>
